# H2 in-memory cho test - khong can MySQL
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwtSecret=TestSecretKeyDuKy64KyTuChoHmacSha256Algorithm0123456789abcdefghijklmnop
app.jwtExpirationMs=86400000

# Tat mail that trong test
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test

app.admin.defaultUsername=admin
app.admin.defaultPassword=admin123
app.cors.allowedOrigins=http://localhost
