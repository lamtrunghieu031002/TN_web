services:
  mysql:
    image: mysql:8.0
    container_name: ptit_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ptit
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ptit_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./ptit        # ← sửa thành ./ptit
      dockerfile: Dockerfile
    container_name: ptit_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ptit?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ptit_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ptit_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ptit_network

networks:
  ptit_network:
    driver: bridge

volumes:
  mysql_data: